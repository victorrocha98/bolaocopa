<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/flag-icon-css/6.6.6/css/flag-icons.min.css">
    <title>🏆 Bolão da Copa - Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="login-page">

<div class="container">
    <div class="card" id="cardLogin">
        <h1>🏆 Bolão da Copa 2026</h1>
        <h2>Entrar no Bolão</h2>
        
        <select id="nomeParticipante">
            <option value="">Carregando usuários...</option>
        </select>
        
        <input type="password" id="senha" placeholder="Digite sua senha" style="width: 100%; margin: 10px 0; padding: 10px; box-sizing: border-box;">
        
        <button onclick="fazerLogin()">Entrar</button>
        
        <div style="margin-top: 20px; text-align: center;">
            <a href="ranking.html" style="color: #1565c0; text-decoration: none; margin: 0 10px;">🏅 Ver Ranking</a>
            <a href="admin.html" style="color: #1565c0; text-decoration: none; margin: 0 10px;">⚙️ Admin</a>
        </div>
        
        <p style="margin-top: 15px; font-size: 12px; color: #666;">Senha padrão: 123456</p>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

<script src="config.js"></script>
<script src="script.js"></script>

<script>
    // Carregar usuários automaticamente do Firebase
    database.ref("usuarios").once('value', snapshot => {
        const usuarios = snapshot.val() || {};
        const select = document.getElementById("nomeParticipante");
        
        select.innerHTML = '<option value="">Selecione seu nome</option>';
        
        Object.keys(usuarios).forEach(nome => {
            const option = document.createElement("option");
            option.value = nome;
            option.textContent = nome;
            select.appendChild(option);
        });
    });
</script>

</body>
</html>

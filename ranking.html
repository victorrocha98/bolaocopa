<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏆 Bolão da Copa - Ranking</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<nav>
    <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap;">
        <div style="display: flex; gap: 15px;">
            <a href="palpites.html">Palpites</a>
            <a href="ranking.html" class="active">Ranking</a>
            <a href="admin.html">Admin</a>
        </div>
        <div id="userInfo" style="color: white; font-weight: bold; background: #1565c0; padding: 5px 15px; border-radius: 20px;">
            👤 Carregando...
        </div>
    </div>
</nav>

<div class="container">

    <h1>🏅 Classificação Geral</h1>
    <p style="text-align: center; color: white; background: rgba(0,0,0,0.3); padding: 10px; border-radius: 10px;">
        📊 Pontuação: <strong style="color: #ffd700;">1 ponto</strong> = acertar o vencedor/empate | 
        <strong style="color: #ffd700;">3 pontos</strong> = acertar o placar exato 🎯
    </p>

    <div class="card">
        <table>
            <thead>
                <tr><th>Posição</th><th>Participante</th><th>Pontos</th></tr>
            </thead>
            <tbody id="ranking"></tbody>
        </table>
    </div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

<script src="config.js"></script>
<script src="jogos.js"></script>
<script src="script.js"></script>

<script>
    const usuarioLogado = localStorage.getItem("usuarioLogado");
    if (usuarioLogado) {
        document.getElementById("userInfo").innerHTML = `👤 ${usuarioLogado}`;
    }
</script>

</body>
</html>
